version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: producer
    main: ./cmd/producer
    binary: producer
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: worker
    main: ./cmd/worker
    binary: worker
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: scheduler
    main: ./cmd/scheduler
    binary: scheduler
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: deadletter
    main: ./cmd/deadletter
    binary: deadletter
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - format: "tar.gz"
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^docs:"
